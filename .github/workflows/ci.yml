name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Run lint
        run: ./scripts/ci-lint.sh

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0" # Keep in sync with Cargo.toml rust-version

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-msrv-
            cargo-${{ runner.os }}-

      - name: Check MSRV compiles
        run: cargo check --all-features

      - name: Test MSRV
        run: cargo test --all-features

  test:
    name: Test (${{ matrix.feature }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        feature:
          - default
          - no-default-features
          - transport_dust_dds
          - transport_lapin
          - transport_redis
          - transport_rumqttc
          - all-features

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ matrix.feature }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.feature }}-
            cargo-${{ runner.os }}-

      - name: Run tests
        env:
          CI_FEATURE: ${{ matrix.feature }}
        run: ./scripts/ci-test.sh

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-docs-
            cargo-${{ runner.os }}-

      - name: Build documentation
        run: ./scripts/ci-docs.sh

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit and cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-machete

      - name: Run cargo audit
        run: cargo audit

      - name: Run cargo machete
        run: cargo machete

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-coverage-
            cargo-${{ runner.os }}-

      - name: Run coverage
        env:
          CI_COVERAGE: "1"
        run: ./scripts/ci-test.sh
